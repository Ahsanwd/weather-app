<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body
    class="bg-gradient-to-br from-indigo-50 to-blue-100 dark:from-darkBg dark:to-gray-900 text-gray-800 dark:text-gray-200 min-h-screen font-sans transition-colors duration-300">

    <div class="max-w-4xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div
                    class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-cloud-sun text-2xl"></i>
                </div>
                <div>
                    <h1
                        class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">
                        SkyCast</h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">Live Weather Updates</p>
                </div>
            </div>

            <button id="theme-toggle"
                class="w-12 h-12 rounded-full flex items-center justify-center bg-white dark:bg-darkCard shadow-sm hover:shadow-md border border-gray-100 dark:border-gray-800 transition-all text-gray-600 dark:text-yellow-400">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-lg"></i>
            </button>
        </header>

        <!-- Search Bar -->
        <div class="relative w-full max-w-2xl mx-auto mb-10 group z-10">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i
                    class="fa-solid fa-location-dot text-gray-400 group-focus-within:text-blue-500 transition-colors text-lg"></i>
            </div>
            <input type="text" id="city-input" placeholder="Search for a city..."
                class="block w-full pl-12 pr-12 py-4 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border border-white dark:border-gray-700/50 rounded-2xl shadow-lg shadow-gray-200/50 dark:shadow-black/20 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-lg transition-all placeholder-gray-400 dark:placeholder-gray-500">
            <button id="search-btn"
                class="absolute inset-y-0 right-2 my-2 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 dark:focus:ring-offset-darkBg">
                <i class="fa-solid fa-search"></i>
            </button>
        </div>

        <!-- Recent Searches Section -->
        <div id="recent-searches-container" class="mb-10 text-center hidden animate-fade-in">
            <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Recent
                Searches</h3>
            <div id="recent-searches" class="flex flex-wrap justify-center gap-2">
                <!-- Badges will be injected here -->
            </div>
        </div>

        <!-- Feedback Container (Errors/Loading) -->
        <div id="feedback-container" class="w-full max-w-2xl mx-auto hidden mt-4 transition-all">
            <!-- Loading -->
            <div id="loading-spinner" class="hidden flex-col items-center justify-center py-10">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-gray-500 dark:text-gray-400 font-medium animate-pulse">Fetching latest weather data...
                </p>
            </div>

            <!-- Error Message -->
            <div id="error-message"
                class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-500/30 rounded-2xl p-4 flex items-start gap-4 shadow-sm animate-shake">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-xl mt-0.5"></i>
                <div>
                    <h3 class="font-bold text-red-800 dark:text-red-300">Oops!</h3>
                    <p id="error-text" class="text-red-600 dark:text-red-400 text-sm mt-1">Could not find the city.</p>
                </div>
            </div>
        </div>

        <!-- Main Dashboard Container -->
        <div id="weather-dashboard" class="hidden animate-slide-up">

            <!-- Main Weather Card -->
            <div
                class="bg-white/90 dark:bg-darkCard/90 backdrop-blur-xl rounded-3xl p-6 md:p-10 shadow-xl border border-white/50 dark:border-gray-700/50 mb-6 relative overflow-hidden">
                <!-- Background decoration -->
                <div
                    class="absolute top-0 right-0 -mx-20 -my-20 w-64 h-64 bg-blue-500/10 dark:bg-blue-500/5 rounded-full blur-3xl">
                </div>

                <div
                    class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8 text-center md:text-left">
                    <div>
                        <h2 id="city-name" class="text-3xl md:text-5xl font-bold text-gray-900 dark:text-white mb-2">
                            London, UK</h2>
                        <p id="weather-desc"
                            class="text-lg text-gray-500 dark:text-gray-400 capitalize font-medium flex items-center justify-center md:justify-start gap-2">
                            <span id="weather-status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                            Partly Cloudy
                        </p>
                    </div>

                    <div class="flex items-center gap-6 md:gap-8">
                        <div id="weather-icon-container"
                            class="text-6xl md:text-8xl text-blue-500 drop-shadow-xl animate-pulse-slow">
                            <i class="fa-solid fa-cloud-sun"></i>
                        </div>
                        <div class="text-left">
                            <span id="temperature"
                                class="text-6xl md:text-7xl font-bold tracking-tighter text-gray-900 dark:text-white drop-shadow-sm">72<span
                                    class="text-4xl text-gray-400 dark:text-gray-500 font-normal">°c</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detailed Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Humidity Card -->
                <div
                    class="bg-white/80 dark:bg-darkCard/80 backdrop-blur-md rounded-2xl p-6 shadow-lg border border-white/40 dark:border-gray-700/40 flex items-center gap-5 transform transition hover:scale-[1.02]">
                    <div
                        class="w-14 h-14 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-500 flex items-center justify-center text-2xl shadow-inner">
                        <i class="fa-solid fa-droplet"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium uppercase tracking-wide mb-1">
                            Humidity</p>
                        <p id="humidity" class="text-2xl font-bold text-gray-900 dark:text-gray-100">45%</p>
                    </div>
                </div>

                <!-- Wind Speed Card -->
                <div
                    class="bg-white/80 dark:bg-darkCard/80 backdrop-blur-md rounded-2xl p-6 shadow-lg border border-white/40 dark:border-gray-700/40 flex items-center gap-5 transform transition hover:scale-[1.02]">
                    <div
                        class="w-14 h-14 rounded-full bg-indigo-50 dark:bg-indigo-900/20 text-indigo-500 flex items-center justify-center text-2xl shadow-inner">
                        <i class="fa-solid fa-wind"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium uppercase tracking-wide mb-1">
                            Wind Speed</p>
                        <p id="wind-speed" class="text-2xl font-bold text-gray-900 dark:text-gray-100">12 km/h</p>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
